syntax = "proto3";

package clh_proto.plugin;
option go_package = "github.com/SydneyOwl/clh-proto/gen/go/v20260312";
option csharp_namespace = "SydneyOwl.CLHProto.Plugin";

import "google/protobuf/timestamp.proto";

enum UploadStatus {
  UPLOAD_STATUS_UNSPECIFIED = 0;
  UPLOAD_STATUS_PENDING = 1;
  UPLOAD_STATUS_UPLOADING = 2;
  UPLOAD_STATUS_SUCCESS = 3;
  UPLOAD_STATUS_FAIL = 4;
  UPLOAD_STATUS_IGNORED = 5;
}

enum ClhPluginLifecycleEventType {
  CLH_PLUGIN_LIFECYCLE_EVENT_TYPE_UNSPECIFIED = 0;
  CLH_PLUGIN_LIFECYCLE_EVENT_TYPE_CONNECTED = 1;
  CLH_PLUGIN_LIFECYCLE_EVENT_TYPE_DISCONNECTED = 2;
  CLH_PLUGIN_LIFECYCLE_EVENT_TYPE_TIMEOUT = 3;
  CLH_PLUGIN_LIFECYCLE_EVENT_TYPE_REPLACED = 4;
}

enum ClhServiceRunStatus {
  CLH_SERVICE_RUN_STATUS_UNSPECIFIED = 0;
  CLH_SERVICE_RUN_STATUS_STARTING = 1;
  CLH_SERVICE_RUN_STATUS_RUNNING = 2;
  CLH_SERVICE_RUN_STATUS_STOPPED = 3;
  CLH_SERVICE_RUN_STATUS_ERROR = 4;
}

message ClhQSODetail{
  map<string, bool> uploaded_services = 1;
  map<string, string> uploaded_services_error_message = 2;
  string original_country_name = 3;
  int32 cq_zone = 4;
  int32 itu_zone = 5;
  string continent = 6;
  float latitude = 7;
  float longitude = 8;
  float gmt_offset = 9;
  string dxcc = 10;
  google.protobuf.Timestamp date_time_off = 11;
  string dx_call = 12;
  string dx_grid = 13;
  uint64 tx_frequency_in_hz = 14;
  string tx_frequency_in_meters = 15;
  string mode = 16;
  string parent_mode = 17;
  string report_sent = 18;
  string report_received = 19;
  string tx_power = 20;
  string comments = 21;
  string name = 22;
  google.protobuf.Timestamp date_time_on = 23;
  string operator_call = 24;
  string my_call = 25;
  string my_grid = 26;
  string exchange_sent = 27;
  string exchange_received = 28;
  string adif_propagation_mode = 29;
  string client_id = 30;
  string raw_data = 32;
  string fail_reason = 33;
  UploadStatus upload_status = 35;
  bool forced_upload = 37;
  string uuid = 38;
}

message ClhQSOUploadStatusChanged {
  ClhQSODetail detail = 1;
}

message ClhPluginLifecycleChanged {
  string plugin_uuid = 1;
  string plugin_name = 2;
  string plugin_version = 3;
  string reason = 4;
  ClhPluginLifecycleEventType event_type = 5;
  google.protobuf.Timestamp event_time = 6;
}

message ClhServerStatusChanged {
  string clh_instance_id = 1;
  string clh_version = 2;
  uint32 connected_plugin_count = 3;
  google.protobuf.Timestamp event_time = 4;
}

message ClhQsoQueueStatusChanged {
  uint32 pending_count = 1;
  uint64 uploaded_total = 2;
  uint64 failed_total = 3;
  google.protobuf.Timestamp event_time = 4;
}

message ClhSettingsChanged {
  string changed_part = 1;
  string summary = 2;
  google.protobuf.Timestamp event_time = 3;
}

message ClhPluginTelemetryChanged {
  string plugin_uuid = 1;
  uint64 received_message_count = 2;
  uint64 sent_message_count = 3;
  uint64 control_request_count = 4;
  uint64 control_error_count = 5;
  uint32 last_roundtrip_ms = 6;
  google.protobuf.Timestamp event_time = 7;
}

message ClhInternalMessage {
  oneof payload {
    ClhQSOUploadStatusChanged qso_upload_status = 2;
    ClhPluginLifecycleChanged plugin_lifecycle = 3;
    ClhServerStatusChanged server_status = 4;
    ClhQsoQueueStatusChanged qso_queue_status = 7;
    ClhSettingsChanged settings_changed = 8;
    ClhPluginTelemetryChanged plugin_telemetry = 9;
  }
  google.protobuf.Timestamp timestamp = 999;
}